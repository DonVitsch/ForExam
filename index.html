<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>考试自测系统</title>
  <link rel="stylesheet" href="css/style.css?v=20260629-1" />
</head>
<body>
<main class="app-shell">
  <section class="hero-card">
    <p class="eyebrow">Exam Practice</p>
    <h1>考试自测系统</h1>
    <p class="subtext">选择科目开始刷题，错题会自动保存到本地错题本。</p>
  </section>

  <section class="panel">
    <div class="section-title">
      <h2>科目列表</h2>
      <span id="subjectCount" class="badge">3</span>
    </div>
    <div id="subjectList" class="card-grid">
      <a class="subject-card" href="subject.html?subj=web-crawler">
        <div>
          <h3>网络信息提取与编程</h3>
          <p>点击进入科目</p>
        </div>
        <p>开始学习 →</p>
      </a>

      <a class="subject-card" href="subject.html?subj=java">
        <div>
          <h3>Java</h3>
          <p>点击进入科目</p>
        </div>
        <p>开始学习 →</p>
      </a>

      <a class="subject-card" href="subject.html?subj=android-development">
        <div>
          <h3>Android开发</h3>
          <p>点击进入科目</p>
        </div>
        <p>开始学习 →</p>
      </a>
    </div>
  </section>

  <section class="panel">
    <button id="mistakeBookBtn" class="wide-btn danger-soft" type="button">
      错题本
      <span id="mistakeCount" class="pill">0</span>
    </button>
  </section>
</main>

<script>
  const INDEX_MISTAKE_KEY = "exam_self_test_mistakes_v1";
  const INDEX_RETRY_KEY = "__mistake_retry__";

  function getIndexMistakeCount() {
    try {
      const raw = localStorage.getItem(INDEX_MISTAKE_KEY);
      const data = raw ? JSON.parse(raw) : {};
      return Object.values(data).reduce((sum, list) => {
        return sum + (Array.isArray(list) ? list.length : 0);
      }, 0);
    } catch (error) {
      return 0;
    }
  }

  const mistakeCount = document.querySelector("#mistakeCount");
  const mistakeBookBtn = document.querySelector("#mistakeBookBtn");

  if (mistakeCount) {
    mistakeCount.textContent = String(getIndexMistakeCount());
  }

  if (mistakeBookBtn) {
    mistakeBookBtn.addEventListener("click", () => {
      window.location.href = `exam.html?subj=${encodeURIComponent(INDEX_RETRY_KEY)}&type=mistakes`;
    });
  }
</script>
<script src="js/app.js?v=20260629-1"></script>
</body>
</html>
